training:
  seed: 42
  batch_size: 64
  num_epochs: 50
  num_epochs_frozen: 30
  early_stopping_patience: 7
  grad_clip_norm: 1.0

optimizer:
  type: adam
  lr_scratch: 0.001
  lr_finetune: 0.0001
  weight_decay: 0.0001

scheduler:
  type: ReduceLROnPlateau
  factor: 0.5
  patience: 3

data:
  dataset: PneumoniaMNIST
  download: true
  num_workers: 0

paths:
  checkpoint_dir: checkpoints
